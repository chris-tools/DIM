<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Distribution In Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .card {
  position: relative;
  background: rgba(15, 23, 42, 0.75);
  border-radius: 18px;
  padding: 24px;

  backdrop-filter: blur(10px);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);

  border: 1px solid rgba(255,255,255,0.08);
}

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .tagline {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

   .button {
  display: block;
  padding: 18px;
  margin: 14px 0;
  border-radius: 16px;
  text-decoration: none;

  font-size: 18px; /* 👈 bigger text */
  font-weight: 600;
  color: #e0ecff;

  background: linear-gradient(145deg, #1e40af, #2563eb);

  box-shadow:
    0 6px 14px rgba(0,0,0,0.5),                 /* outer shadow */
    inset 0 2px 4px rgba(255,255,255,0.15),     /* top highlight (stronger bevel) */
    inset 0 -3px 6px rgba(0,0,0,0.35);          /* bottom inner shadow */

  border: 1px solid rgba(255,255,255,0.12);

  text-shadow:
    0 1px 0 rgba(0,0,0,0.6),                    /* depth */
    0 0 6px rgba(255,255,255,0.15);             /* slight glow */

  transition: all 0.15s ease;
}

    .button:hover {
      transform: translateY(-2px);
    }

    .button:active {
  transform: translateY(2px);

  box-shadow:
    0 2px 6px rgba(0,0,0,0.6),
    inset 0 3px 6px rgba(0,0,0,0.5);
}

    .button.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

    .footer {
  margin-top: 24px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px;
}

 .signature {
  font-size: 10px;
  margin-top: 10px;

  color: rgba(255,255,255,0.05); /* super subtle */
  user-select: text;
}
    
  </style>
</head>

<body>
  <div class="container">
  <div class="card">
    <h1>Distribution In Motion</h1>
    <div class="tagline">Tools for tracking, auditing, and inventory control</div>
    <a class="button" href="https://chris-tools.github.io/Truck-Audit-Utility/">Truck Audit Utility</a>
    <a class="button" href="https://chris-tools.github.io/Reel-Tracker-Utility/">Reel Tracking Utility</a>
    <a class="button disabled" href="#" onclick="return false;">Commercial CPE (Coming Soon)</a>
    <div class="signature">Distribution In Motion • Built by Chris Gagnon</div>
    <div class="footer">v1.0 • DIM • Distribution In Motion</div>
  </div>
</div>

 </body>
</html>
