<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Distribution In Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .tagline {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

   .button {
  display: block;
  padding: 16px;
  margin: 12px 0;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: bold;

  background: linear-gradient(145deg, #1e40af, #2563eb);
  box-shadow:
    0 4px 8px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);

  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.15s ease;
}

    .button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Distribution In Motion</h1>
    <div class="tagline">Tools for tracking, auditing, and inventory control</div>

    <a class="button" href="#">Truck Audit Utility</a>
    <a class="button" href="#">Reel Tracking Utility</a>
    <a class="button" href="#">Commercial CPE (Coming Soon)</a>
  </div>
</body>
</html>
